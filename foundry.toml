[profile.default]
src = "src"
out = "out"
libs = ["lib"]
via_ir = true # This enables IR (Intermediate Representation) code generation in the Solidity compiler, which optimizes the stack allocation much better than the default code generation and can handle functions with deeper stacks

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
